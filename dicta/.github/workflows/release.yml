name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.0.4)'
        required: true
        type: string
      dry_run:
        description: 'Dry run (no actual release)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

env:
  APP_NAME: Dicta
  GITHUB_REPO: nitintf/dicta

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tag or input
        id: get-version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          fi

      - name: Create draft release
        if: ${{ !inputs.dry_run }}
        id: create_release
        uses: comnoco/create-release-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.get-version.outputs.version }}
          release_name: ${{ env.APP_NAME }} v${{ steps.get-version.outputs.version }}
          body: |
            ## What's Changed

            See the full changelog for details.

            ## Downloads

            | Platform | Download |
            |----------|----------|
            | macOS (Apple Silicon) | `${{ env.APP_NAME }}_${{ steps.get-version.outputs.version }}_aarch64.dmg` |
            | macOS (Intel) | `${{ env.APP_NAME }}_${{ steps.get-version.outputs.version }}_x86_64.dmg` |
          draft: true
          prerelease: false

  build:
    name: Build (${{ matrix.arch_name }})
    needs: create-release
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: aarch64
            arch_name: Apple Silicon
            runner: macos-14  # M1 runner for native ARM build
          - target: x86_64-apple-darwin
            arch: x86_64
            arch_name: Intel
            runner: macos-latest  # Intel cross-compile on latest runner

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.target }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
          VITE_POSTHOG_HOST: https://us.i.posthog.com
        run: |
          pnpm tauri build --target ${{ matrix.target }} --bundles app,dmg

      - name: Prepare artifacts
        id: artifacts
        env:
          VERSION: ${{ needs.create-release.outputs.version }}
        run: |
          # Store workspace root
          WORKSPACE_ROOT="${GITHUB_WORKSPACE}"

          # Find build artifacts
          DMG_PATH=$(find src-tauri/target/${{ matrix.target }}/release/bundle/dmg -name "*.dmg" | head -n 1)
          APP_DIR="src-tauri/target/${{ matrix.target }}/release/bundle/macos"
          APP_BUNDLE=$(find "$APP_DIR" -maxdepth 1 -name "*.app" | head -n 1)

          # Create output directory
          mkdir -p "${WORKSPACE_ROOT}/release-artifacts"

          # Copy DMG
          cp "$DMG_PATH" "${WORKSPACE_ROOT}/release-artifacts/${APP_NAME}_${VERSION}_${{ matrix.arch }}.dmg"

          # Create app.tar.gz for updater (use absolute path for output)
          cd "$APP_DIR"
          APP_NAME_BUNDLE=$(basename "$APP_BUNDLE")
          COPYFILE_DISABLE=1 tar -czf "${WORKSPACE_ROOT}/release-artifacts/${APP_NAME}_${VERSION}_${{ matrix.arch }}.app.tar.gz" \
            --exclude='._*' --exclude='.DS_Store' "$APP_NAME_BUNDLE"
          cd "${WORKSPACE_ROOT}"

          echo "dmg=release-artifacts/${APP_NAME}_${VERSION}_${{ matrix.arch }}.dmg" >> $GITHUB_OUTPUT
          echo "tar=release-artifacts/${APP_NAME}_${VERSION}_${{ matrix.arch }}.app.tar.gz" >> $GITHUB_OUTPUT

      - name: Sign update artifact
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          VERSION: ${{ needs.create-release.outputs.version }}
        run: |
          if [ -n "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            TAR_FILE="release-artifacts/${APP_NAME}_${VERSION}_${{ matrix.arch }}.app.tar.gz"
            pnpm tauri signer sign -k "$TAURI_SIGNING_PRIVATE_KEY" -p "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" "$TAR_FILE" || echo "Signing failed, continuing without signature"
          else
            echo "No signing key configured, skipping artifact signing"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.arch }}
          path: release-artifacts/*
          retention-days: 1

  publish:
    name: Publish Release
    needs: [create-release, build]
    runs-on: ubuntu-latest
    if: ${{ !inputs.dry_run }}
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Read signatures and create latest.json
        env:
          VERSION: ${{ needs.create-release.outputs.version }}
        run: |
          # Read signatures if they exist
          AARCH64_SIG=""
          X86_64_SIG=""

          if [ -f "artifacts/${APP_NAME}_${VERSION}_aarch64.app.tar.gz.sig" ]; then
            AARCH64_SIG=$(cat "artifacts/${APP_NAME}_${VERSION}_aarch64.app.tar.gz.sig" | tr -d '\n')
          fi

          if [ -f "artifacts/${APP_NAME}_${VERSION}_x86_64.app.tar.gz.sig" ]; then
            X86_64_SIG=$(cat "artifacts/${APP_NAME}_${VERSION}_x86_64.app.tar.gz.sig" | tr -d '\n')
          fi

          # Create latest.json
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          cat > artifacts/latest.json <<EOF
          {
            "version": "v${VERSION}",
            "notes": "See the release notes for v${VERSION}",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${AARCH64_SIG}",
                "url": "https://github.com/${GITHUB_REPO}/releases/download/v${VERSION}/${APP_NAME}_${VERSION}_aarch64.app.tar.gz"
              },
              "darwin-x86_64": {
                "signature": "${X86_64_SIG}",
                "url": "https://github.com/${GITHUB_REPO}/releases/download/v${VERSION}/${APP_NAME}_${VERSION}_x86_64.app.tar.gz"
              }
            }
          }
          EOF

          cat artifacts/latest.json

      - name: Upload to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.create-release.outputs.version }}
        run: |
          # Upload all artifacts to the release
          for file in artifacts/*; do
            if [ -f "$file" ]; then
              echo "Uploading: $(basename $file)"
              gh release upload "v${VERSION}" "$file" --clobber
            fi
          done

      - name: Summary
        env:
          VERSION: ${{ needs.create-release.outputs.version }}
        run: |
          echo "## Release v${VERSION} Created! 🎉" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts uploaded:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for file in artifacts/*; do
            if [ -f "$file" ]; then
              echo "- \`$(basename $file)\`" >> $GITHUB_STEP_SUMMARY
            fi
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next steps:" >> $GITHUB_STEP_SUMMARY
          echo "1. Review the [draft release](https://github.com/${GITHUB_REPO}/releases/tag/v${VERSION})" >> $GITHUB_STEP_SUMMARY
          echo "2. Test the DMGs on both Apple Silicon and Intel Macs" >> $GITHUB_STEP_SUMMARY
          echo "3. Publish the release when ready" >> $GITHUB_STEP_SUMMARY
